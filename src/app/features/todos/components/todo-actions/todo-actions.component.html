<div class="todo-actions">
  <a class="todo-actions__button" matButton="tonal" [routerLink]="['/', todoId()]">
    View / edit
  </a>
  <button
    class="todo-actions__button todo-actions__button--danger"
    matButton="outlined"
    type="button"
    (click)="remove.emit()"
  >
    Delete
  </button>
</div>
