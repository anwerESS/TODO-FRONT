<form class="todo-filters" [formGroup]="form" novalidate>
  <label class="todo-filters__search" for="todo-search">
    <span>Search</span>
    <input
      id="todo-search"
      type="search"
      formControlName="search"
      autocomplete="off"
      placeholder="Title or content"
    />
  </label>

  <label class="todo-filters__field" for="todo-priority-filter">
    <span>Priority</span>
    <select id="todo-priority-filter" formControlName="priority">
      <option value="ALL">All priorities</option>
      @for (priority of priorities; track priority) {
        <option [value]="priority">{{ priority }}</option>
      }
    </select>
  </label>

  <label class="todo-filters__field" for="todo-completion-filter">
    <span>Status</span>
    <select id="todo-completion-filter" formControlName="completion">
      <option value="all">All statuses</option>
      <option value="active">To do</option>
      <option value="completed">Completed</option>
    </select>
  </label>

  <button class="todo-filters__reset" type="button" (click)="reset()">Reset</button>
</form>
