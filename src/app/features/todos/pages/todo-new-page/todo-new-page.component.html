<section class="todo-new">
  <div class="todo-new__heading">
    <a matButton="text" routerLink="/">Back to list</a>
    <h1>New todo</h1>
  </div>

  @if (error()) {
    <p class="todo-new__error">{{ error() }}</p>
  }

  <app-todo-form [autoFocus]="true" submitLabel="Create todo" (submitted)="createTodo($event)" />
</section>
