<section class="todo-home">
  <div class="todo-home__heading">
    <div>
      <h1>Todos</h1>
      <div class="todo-home__stats" aria-label="Todo summary">
        <span>{{ activeCount() }} active</span>
        <span>{{ completedCount() }} completed</span>
        <span>{{ totalCount() }} total</span>
      </div>
    </div>

    <a class="todo-home__new" matButton="filled" routerLink="/new">New todo</a>
  </div>

  <app-todo-filters (filtersChange)="updateFilters($event)" />

  @if (filteredTodos().length > 0) {
    <ul class="todo-home__list" aria-label="Todo list">
      @for (todo of filteredTodos(); track todo.id) {
        <li>
          <app-todo-list-item
            [todo]="todo"
            (remove)="deleteTodo($event)"
            (toggleCompleted)="toggleCompleted($event)"
          />
        </li>
      }
    </ul>
  } @else {
    <mat-card class="todo-home__empty" appearance="outlined">
      <mat-card-content>
        <h2>No todos found</h2>
        <p>Create a todo or adjust the filters.</p>
      </mat-card-content>
      <mat-card-actions>
        <a matButton="filled" routerLink="/new">Create todo</a>
      </mat-card-actions>
    </mat-card>
  }
</section>
